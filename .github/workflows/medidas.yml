name: 📏 Buscar Medidas Automáticamente

on:
  workflow_dispatch: # Permite ejecutar el robot manualmente con un botón
  schedule:
    - cron: '0 2 * * 0' # Se ejecutará automáticamente todos los domingos a las 02:00 AM

jobs:
  actualizar-medidas:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar Robot de Búsqueda
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python buscar_medidas.py

      - name: Guardar y Subir Archivo JSON (Auto-Commit)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add medidas.json
          git commit -m "🤖 Automático: Actualización de medidas de productos" || echo "No hay cambios nuevos para guardar"
          git push
